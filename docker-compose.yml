services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change_me_to_a_random_string}
      - PLAYER1_USERNAME=${PLAYER1_USERNAME:-player1}
      - PLAYER1_PASSWORD=${PLAYER1_PASSWORD:-pass1}
      - PLAYER2_USERNAME=${PLAYER2_USERNAME:-player2}
      - PLAYER2_PASSWORD=${PLAYER2_PASSWORD:-pass2}
      - DEFAULT_TIMER_MINUTES=${DEFAULT_TIMER_MINUTES:-30}
      - E2E_ENABLE_TEST_HOOKS=${E2E_ENABLE_TEST_HOOKS:-0}
    volumes:
      - db_data:/app/backend/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/app/frontend:ro
    depends_on:
      - app

volumes:
  db_data:
