      sound.play('uiTap');
      opt.action();
      document.getElementById('kanPanel').style.display = 'none';
      hideActions();
    });
    container.appendChild(btn);
  }
  document.getElementById('kanPanel').style.display = 'flex';
}

// ====================== Phase 2 Guess ======================
function getDeclarerDiscardTypes() {
  const discards = state.tenpaiDeclarer === state.mySeat ? state.myDiscards : state.oppDiscards;
  return new Set((discards || []).map((tileId) => tileType(tileId)));
}

function getGuessSystemDisabledTypes(alreadyGuessed = state.phase2GuessedTypes || []) {
  const guessed = new Set(alreadyGuessed || []);
  const declarerDiscarded = getDeclarerDiscardTypes();
  const blocked = new Set([...guessed]);
  return { guessed, declarerDiscarded, blocked };
}

function getGuessSelectableTypes(alreadyGuessed = state.phase2GuessedTypes || []) {
  const { blocked } = getGuessSystemDisabledTypes(alreadyGuessed);
  const selectable = [];
  for (let tt = 0; tt < 34; tt++) {
    if (!blocked.has(tt)) selectable.push(tt);
  }
  return selectable;
}

function normalizeGuessUiState() {
  const { blocked } = getGuessSystemDisabledTypes();
  for (const tileTypeValue of Array.from(guessMarked)) {
    if (blocked.has(tileTypeValue)) {
      guessMarked.delete(tileTypeValue);
    }
  }
  for (const tileTypeValue of Array.from(guessSelected)) {
    if (blocked.has(tileTypeValue) || guessMarked.has(tileTypeValue)) {
      guessSelected.delete(tileTypeValue);
    }
  }
}

function updateGuessPanelMeta() {
  const panel = document.getElementById('guessPanel');
  if (!panel) return;

  const countEl = document.getElementById('guessCount');
  const confirmBtn = document.getElementById('guessConfirm');
  const skipBtn = document.getElementById('guessSkip');
  const subtitleEl = document.getElementById('guessSubtitle');
  const toggleBtn = document.getElementById('guessToggle');
  const selectBtn = document.getElementById('guessModeSelect');
  const markBtn = document.getElementById('guessModeMark');
  const clearBtn = document.getElementById('guessClearMarks');
  const markedCount = guessMarked.size;
  const selectableCount = getGuessSelectableTypes().length;
  const requiredCount = Math.min(2, selectableCount);

  panel.classList.toggle('minimized', guessPanelMinimized);
  panel.classList.toggle('mark-mode', guessMode === 'mark');
  countEl.textContent = markedCount > 0
    ? `已选: ${guessSelected.size} / ${requiredCount} · 已排除: ${markedCount}`
    : `已选: ${guessSelected.size} / ${requiredCount}`;
  confirmBtn.disabled = requiredCount === 0 || guessSelected.size !== requiredCount;
  confirmBtn.style.display = requiredCount > 0 ? '' : 'none';
  skipBtn.style.display = requiredCount === 0 ? '' : 'none';
  skipBtn.disabled = requiredCount !== 0;
  subtitleEl.textContent = guessMode === 'mark'
    ? '手动排除仅对你自己生效，再点一次即可取消。'
    : (requiredCount === 0
      ? '系统已无可选牌，可直接跳过本轮猜牌。'
      : (requiredCount === 1
        ? '系统只锁定已猜过的牌。当前只剩1张可选；宣听者已打出的牌仍可选择。'
        : '系统只锁定已猜过的牌；宣听者已打出的牌仍可选择。'));
  toggleBtn.textContent = guessPanelMinimized ? '展开' : '最小化';
  selectBtn.classList.toggle('active', guessMode === 'select');
  markBtn.classList.toggle('active', guessMode === 'mark');
  clearBtn.disabled = markedCount === 0;
}

function renderGuessTiles() {
  const container = document.getElementById('guessTiles');
  container.innerHTML = '';
  normalizeGuessUiState();

  const { guessed, declarerDiscarded, blocked } = getGuessSystemDisabledTypes();
  const groups = [
    { label: '万子', start: 0, end: 9 },
    { label: '筒子', start: 9, end: 18 },
    { label: '索子', start: 18, end: 27 },
    { label: '字牌', start: 27, end: 34 },
  ];

  for (const g of groups) {
    const suitGroup = document.createElement('div');
    suitGroup.className = 'guess-suit-group';

    const label = document.createElement('div');
    label.className = 'guess-suit-label';
    label.textContent = g.label;
    suitGroup.appendChild(label);

    const tilesRow = document.createElement('div');
    tilesRow.className = 'guess-suit-tiles';
    for (let tt = g.start; tt < g.end; tt++) {
      const isGuessed = guessed.has(tt);
      const isDiscarded = declarerDiscarded.has(tt);
      const isMarked = guessMarked.has(tt);
      const isSelected = guessSelected.has(tt);
      const el = createTileTypeElement(tt, { size: 'small', clickable: !blocked.has(tt) });

      if (isSelected) {
        el.classList.add('selected');
      }
      if (isGuessed) {
        el.classList.add('guessed');
      }
      if (isDiscarded) {
        el.classList.add('declarer-discarded');
      }
      if (isMarked) {
        el.classList.add('marked');
      }

      if (isGuessed && isDiscarded) {
        el.title = '已猜过，且宣听者曾打出过这张牌';
      } else if (isGuessed) {
        el.title = '已猜过，系统已锁定';
      } else if (isDiscarded) {
        el.title = '宣听者已打出过这张牌，但仍可选择';
      } else if (isMarked) {
        el.title = '你已手动排除，再点一次可取消排除';
      } else if (guessMode === 'mark') {
        el.title = '点击切换排除标记';
      } else {
        el.title = '点击选择猜测牌';
      }

      if (!blocked.has(tt)) {
        el.addEventListener('click', () => handleGuessTileClick(tt));
      }
      tilesRow.appendChild(el);
    }
    suitGroup.appendChild(tilesRow);
    container.appendChild(suitGroup);
  }

  updateGuessPanelMeta();
}

function setGuessMode(mode) {
  const nextMode = mode === 'mark' ? 'mark' : 'select';
  if (guessMode === nextMode) return;
  sound.play('uiTap');
  guessMode = nextMode;
  renderGuessTiles();
}

function clearMarkedGuessTiles() {
  if (guessMarked.size === 0) return;
  sound.play('uiTap');
  guessMarked.clear();
  renderGuessTiles();
}

function toggleGuessPanelMinimized() {
  sound.play('uiTap');
  guessPanelMinimized = !guessPanelMinimized;
  updateGuessPanelMeta();
}

function handleGuessTileClick(tt) {
  const { blocked } = getGuessSystemDisabledTypes();
  if (blocked.has(tt)) return;

  if (guessMode === 'mark') {
    sound.play('uiTap');
    if (guessMarked.has(tt)) {
      guessMarked.delete(tt);
    } else {
      guessMarked.add(tt);
      guessSelected.delete(tt);
    }
    renderGuessTiles();
    return;
  }

  if (guessMarked.has(tt)) {
    sound.play('uiTap');
    guessMarked.delete(tt);
    renderGuessTiles();
    return;
  }
  if (guessSelected.has(tt)) {
    sound.play('uiTap');
    guessSelected.delete(tt);
  } else {
    const requiredCount = Math.min(2, getGuessSelectableTypes().length);
    if (guessSelected.size >= requiredCount) return;
    sound.play('uiTap');
    guessSelected.add(tt);
  }
  renderGuessTiles();
}

function openGuessPanel(message, alreadyGuessed = []) {
  phase2GuessMessage = message || '请选择2张牌进行猜测';
  guessSelected.clear();
  guessMode = 'select';
  guessPanelMinimized = false;
  state.phase2GuessedTypes = alreadyGuessed || state.phase2GuessedTypes || [];
  document.getElementById('guessTitle').textContent = phase2GuessMessage;
  renderGuessTiles();
  document.getElementById('guessPanel').style.display = 'block';
}

function submitGuess() {
  const requiredCount = Math.min(2, getGuessSelectableTypes().length);
  if (requiredCount === 0 || guessSelected.size !== requiredCount) return;
  sound.play('uiTap');
  send({ type: 'phase2_guess', tiles: Array.from(guessSelected) });
  guessSelected.clear();
  updateGuessPanelMeta();
  document.getElementById('guessPanel').style.display = 'none';
}

function skipGuess() {
  if (getGuessSelectableTypes().length !== 0) return;
  sound.play('uiTap');
  send({ type: 'phase2_guess', tiles: [] });
  guessSelected.clear();
  updateGuessPanelMeta();
  document.getElementById('guessPanel').style.display = 'none';
}

// ====================== Helpers ======================
function formatPointsRows(myPts, oppPts, myDelta, oppDelta) {
  return `
    <div class="result-points-row">
      <span class="result-player-name">你</span>
      <span class="result-player-value">${myPts} <span class="${myDelta >= 0 ? 'points-change-positive' : 'points-change-negative'}">(${myDelta >= 0 ? '+' : ''}${myDelta})</span></span>
    </div>
    <div class="result-points-row">
      <span class="result-player-name">${state.oppName}</span>
      <span class="result-player-value">${oppPts} <span class="${oppDelta >= 0 ? 'points-change-positive' : 'points-change-negative'}">(${oppDelta >= 0 ? '+' : ''}${oppDelta})</span></span>
    </div>
  `;
}

function formatWinScoreBreakdown({ han, fu, handPoints, honbaBonus, riichiBonus, totalGain }) {
  const rows = [
    `<div class="result-score-line">${han}番 ${fu}符</div>`,
    `<div class="result-breakdown-row"><span>和牌点</span><span>${handPoints}点</span></div>`,
  ];

  if (honbaBonus > 0) {
    rows.push(`<div class="result-breakdown-row"><span>本场加点</span><span>+${honbaBonus}点</span></div>`);
  }
  if (riichiBonus > 0) {
    rows.push(`<div class="result-breakdown-row"><span>立直棒加点</span><span>+${riichiBonus}点</span></div>`);
  }

  rows.push(`<div class="result-breakdown-total">合计获得 ${totalGain}点</div>`);
  return rows.join('');
}

function yakuHanLabel(yakuText) {
  const match = String(yakuText).match(/\s(\d+)$/);
  if (!match) return '';
  return `${match[1]}番`;
}

function translateYaku(name) {
  // Try exact match, then try partial
  if (YAKU_TRANSLATE[name]) return YAKU_TRANSLATE[name];
  // Handle "Dora 2" etc.
  const doraMatch = name.match(/^Dora (\d+)$/);
  if (doraMatch) return `宝牌 ${doraMatch[1]}`;
  return name;
}

function showToast(text, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, 2700);
}
