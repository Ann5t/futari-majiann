<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二人麻雀 - 对局</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260404v2">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <script src="/static/js/tiles-render.js?v=20260403v"></script>
  <script src="/static/js/audio-manager.js?v=20260403v"></script>
</head>
<body>

<div class="game-container" id="app">

  <!-- Opponent area (top) -->
  <div class="opponent-area">
    <div class="opponent-info">
      <span class="name" id="oppName">对手</span>
      <span class="room-status-badge" id="oppRoomStatus" style="display:none"></span>
      <span class="points" id="oppPoints">0</span>
      <span class="tenpai-badge" id="oppTenpai" style="display:none">听牌</span>
      <span class="dealer-badge" id="oppDealer" style="display:none">庄</span>
    </div>
    <div class="meld-zone opponent-meld-zone">
      <div class="meld-zone-label">对手副露</div>
      <div id="oppMelds" class="opponent-melds"></div>
    </div>
  </div>
  <div class="opponent-tiles" id="oppTiles"></div>

  <!-- Center area -->
  <div class="center-area">
    <div class="room-ready-bar" id="roomReadyBar" style="display:none;">
      <div class="room-ready-text" id="roomReadyText">等待玩家加入...</div>
      <div class="room-ready-actions">
        <button class="btn-primary" id="btnRoomReady" onclick="setRoomReady(true)">准备</button>
        <button class="btn-secondary" id="btnRoomUnready" onclick="setRoomReady(false)" style="display:none;">取消准备</button>
        <button class="btn-secondary" onclick="leaveWaitingRoom()">退出房间</button>
      </div>
    </div>

    <div class="table-side-panel table-side-panel-left">
      <div class="table-console">
        <div class="game-info-bar">
          <span class="round" id="roundInfo">第1局</span>
            <span class="bonus-pill" id="honbaInfo">本场: 0</span>
            <span class="bonus-pill" id="riichiStickInfo">立直棒: 0</span>
          <span class="wall-count" id="wallCount">余牌: 122</span>
          <span class="timer" id="timer">30:00</span>
        </div>

        <!-- Wind & Dora -->
        <div class="info-row">
          <div class="wind-info" id="windInfo">
            <div class="round-wind">東場</div>
            <div class="seat-wind" id="seatWindChar">東</div>
            <div class="seat-wind-label" id="seatWindLabel">东家</div>
          </div>
          <div class="dora-frame">
            <div class="dora-frame-title">宝牌指示牌</div>
            <div id="doraIndicators" style="display:flex;gap:3px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="table-center-stack">
      <!-- Discard ponds -->
      <div class="discard-area">
        <div>
          <div class="pond-label">对手牌河</div>
          <div class="discard-pond opponent" id="oppDiscard"></div>
        </div>
        <div>
          <div class="pond-label">我的牌河</div>
          <div class="discard-pond" id="myDiscard"></div>
        </div>
      </div>
    </div>

    <div class="table-side-panel table-side-panel-right">
      <div class="audio-controls audio-controls-game" id="audioControls">
        <button class="btn-secondary audio-toggle" id="audioMuteToggle" type="button">声音开</button>
        <label class="audio-slider">SE
          <input type="range" id="audioSeVolume" min="0" max="100" step="5">
        </label>
        <label class="audio-slider">BGM
          <input type="range" id="audioBgmVolume" min="0" max="100" step="5">
        </label>
        <span class="audio-status" id="audioStatus">待启用</span>
      </div>

      <!-- Phase 2 status -->
      <div class="phase2-status" id="phase2Status" style="display:none;">
        <span class="phase2-badge">Phase 2</span>
        <span id="phase2Info">猜牌阶段</span>
      </div>

      <!-- Phase 2 draw display -->
      <div class="phase2-draws" id="phase2Draws" style="display:none;"></div>

      <!-- Waiting indicator -->
      <div class="waiting-indicator" id="waitingIndicator" style="display:none;">
        <div class="waiting-dots"><span></span><span></span><span></span></div>
        <span class="waiting-text">对手思考中...</span>
      </div>

      <div class="room-ready-bar" id="roundReadyBar" style="display:none;">
        <div class="room-ready-text" id="roundReadyText">本局已结束</div>
        <div class="room-ready-actions">
          <button class="btn-primary" id="btnRoundReady" onclick="confirmNextRound()">继续下一局</button>
        </div>
      </div>
    </div>

    <div class="guess-panel guess-panel-docked" id="guessPanel" style="display:none;">
      <div class="guess-box">
        <div class="guess-header">
          <div class="guess-header-copy">
            <h2 id="guessTitle">请选择2张牌进行猜测</h2>
            <div class="guess-subtitle" id="guessSubtitle">系统只会锁定已猜过的牌；宣听者已打出的牌仍可选择，你也可以手动标记排除。</div>
          </div>
          <button class="btn-secondary guess-toggle" id="guessToggle" type="button" onclick="toggleGuessPanelMinimized()">最小化</button>
        </div>
        <div class="guess-body" id="guessBody">
          <div class="guess-toolbar">
            <div class="guess-mode-group">
              <button class="btn-secondary guess-mode-btn active" id="guessModeSelect" type="button" onclick="setGuessMode('select')">选择猜测</button>
              <button class="btn-secondary guess-mode-btn" id="guessModeMark" type="button" onclick="setGuessMode('mark')">标记排除</button>
            </div>
            <button class="btn-secondary guess-clear-btn" id="guessClearMarks" type="button" onclick="clearMarkedGuessTiles()">清除排除</button>
          </div>
          <div class="guess-legend">
            <span class="guess-legend-chip guessed">已猜过（系统锁定）</span>
            <span class="guess-legend-chip discarded">宣听者已打出（可选）</span>
            <span class="guess-legend-chip marked">我的排除（可取消）</span>
          </div>
          <div class="guess-count" id="guessCount">已选: 0 / 2</div>
          <div class="guess-tiles" id="guessTiles"></div>
          <div class="guess-actions">
            <button class="btn-secondary" id="guessSkip" type="button" onclick="skipGuess()" style="display:none;">跳过</button>
            <button class="btn-primary" id="guessConfirm" onclick="submitGuess()" disabled>确认猜测</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Player area (bottom) -->
  <div class="player-area">
    <div class="player-seat-anchor">
      <div class="player-info">
        <div>
          <span class="name" id="myName">我</span>
          <span class="room-status-badge" id="myRoomStatus" style="display:none"></span>
          <span class="dealer-badge" id="myDealer" style="display:none">庄</span>
        </div>
        <span class="points" id="myPoints">0</span>
      </div>
      <div class="my-waits" id="myWaits" style="display:none;"></div>
    </div>
    <div class="meld-zone player-meld-zone">
      <div class="meld-zone-label">我的副露</div>
      <div class="player-melds" id="myMelds"></div>
    </div>
    <div class="player-tiles" id="myTiles"></div>

    <!-- Action bar -->
    <div class="action-bar" id="actionBar" style="display:none;">
      <button class="btn-action-win" id="btnTsumo" onclick="doAction('tsumo')" style="display:none">自摸</button>
      <button class="btn-action-win" id="btnRon" onclick="doAction('ron')" style="display:none">荣和</button>
      <button class="btn-action-call" id="btnChi" onclick="showChiOptions()" style="display:none">吃</button>
      <button class="btn-action-call" id="btnPon" onclick="doAction('pon')" style="display:none">碰</button>
      <button class="btn-action-call" id="btnKan" onclick="showKanOptions()" style="display:none">杠</button>
      <button class="btn-action-call" id="btnRiichi" onclick="doAction('declare_riichi')" style="display:none">立直</button>
      <button class="btn-action-call" id="btnTenpai" onclick="doAction('declare_tenpai')" style="display:none">宣告听牌</button>
      <button class="btn-action-pass" id="btnPass" onclick="doAction('pass')" style="display:none">跳过</button>
    </div>
  </div>
</div>

<!-- Chi option overlay -->
<div class="guess-panel" id="chiPanel" style="display:none;">
  <div class="guess-box">
    <h2>选择吃牌组合</h2>
    <div id="chiOptions" style="display:flex;flex-direction:column;gap:10px;margin:16px 0;"></div>
    <button class="btn-secondary" onclick="document.getElementById('chiPanel').style.display='none'">取消</button>
  </div>
</div>

<!-- Kan option overlay -->
<div class="guess-panel" id="kanPanel" style="display:none;">
  <div class="guess-box">
    <h2>选择杠的类型</h2>
    <div id="kanOptions" style="display:flex;flex-direction:column;gap:10px;margin:16px 0;"></div>
    <button class="btn-secondary" onclick="document.getElementById('kanPanel').style.display='none'">取消</button>
  </div>
</div>

<!-- Round result overlay -->
<div class="result-overlay" id="resultOverlay" style="display:none;">
  <div class="result-box">
    <h2 id="resultTitle"></h2>
    <div class="result-dora" id="resultDora" style="display:none;"></div>
    <div class="hand-display" id="resultHand"></div>
    <div class="yaku-list" id="resultYaku"></div>
    <div class="score-total" id="resultScore"></div>
    <div class="points-update" id="resultPoints"></div>
    <div class="match-over-panel" id="matchOverPanel" style="display:none;">
      <div class="match-over-title" id="matchOverTitle"></div>
      <div class="match-over-subtitle" id="matchOverSubtitle"></div>
      <div class="match-over-points" id="matchOverPoints"></div>
      <div class="match-over-config-row">
        <label class="match-over-field" id="matchOverTimerField">
          <span>下一场时长</span>
          <input type="number" id="rematchTimerMinutes" min="5" max="180" step="5">
        </label>
        <button class="btn-secondary" id="btnApplyRematchTimer" onclick="applyRematchTimer()">应用</button>
      </div>
      <div class="match-over-status" id="matchOverStatus"></div>
      <div class="match-over-actions">
        <button class="btn-primary" id="btnRematchReady" onclick="setRoomReady(true)">准备下一场</button>
        <button class="btn-secondary" id="btnRematchUnready" onclick="setRoomReady(false)" style="display:none;">取消准备</button>
        <button class="btn-secondary" id="btnReturnLobbyFromGameOver" onclick="returnToLobbyFromGameOver()">返回大厅</button>
      </div>
    </div>
    <button class="btn-primary" id="resultContinue" onclick="confirmNextRound()">继续</button>
  </div>
</div>

<!-- Game over overlay -->
<div class="result-overlay" id="gameOverOverlay" style="display:none;">
  <div class="result-box">
    <h2 id="gameOverTitle"></h2>
    <div id="gameOverDetails" style="margin:16px 0;font-size:16px;"></div>
    <button class="btn-primary" onclick="window.location.href='/lobby'">返回大厅</button>
  </div>
</div>

<script>
// ====================== State ======================
const token = sessionStorage.getItem('token');
const username = sessionStorage.getItem('username');
if (!token) window.location.href = '/';

let ws = null;
let state = {
  mySeat: -1,
  phase: 'waiting',
  myHand: [],
  myDrawTile: null,
  myMelds: [],
  myDiscards: [],
  myPoints: 0,
  oppClosedCount: 0,
  oppMelds: [],
  oppDiscards: [],
  oppPoints: 0,
  oppName: '对手',
  dealerSeat: 0,
  roundNumber: 1,
  wallRemaining: 122,
  doraIndicators: [],
  timerRemaining: 1800,
  isLastRound: false,
  currentTurn: 0,
  tenpaiDeclarer: null,
  phase2DrawCount: 0,
  phase2GuessedTypes: [],
  myDeclaredTenpai: false,
  myDeclaredRiichi: false,
  oppDeclaredTenpai: false,
  oppDeclaredRiichi: false,
  honbaCount: 0,
  riichiSticks: 0,
  myWaitingTiles: [],
  roomPlayers: [],
  roomReadyBySeat: {},
  roundReadySeats: [],
  roomOwnerSeat: null,
  roomTimerMinutes: 30,
  gameOverData: null,
};

let actions = {};      // current available actions
let selectedTile = null;
let guessSelected = new Set();
let guessMarked = new Set();
let guessMode = 'select';
let guessPanelMinimized = false;
let phase2GuessMessage = '请选择2张牌进行猜测';
let phase2DrawTimer = null;  // timer ID for Phase 2 draw pacing
let phase2ResumeKey = null;
let timerTick = null;
let leaveLobbyPendingTimer = null;
let chiOptionsData = [];
let kanOptionsData = { ankan: [], kakan: [] };
let resultRevealTimers = [];
const sound = window.createFutariAudioManager({ defaultSeVolume: 0.60, defaultBgmVolume: 0.18 });
const roomAudioState = { playerCount: 0, myReady: null, oppReady: null };
let isLeavingLobbyFromGameOver = false;

sound.bindControls();

function syncSceneAudio() {
  if (state.phase === 'waiting' && state.roundNumber === 0) {
    sound.playBgm('ready', { gain: 1, fadeMs: 220 });
    return;
  }
  if (state.phase === 'game_over') {
    sound.stopBgm({ fadeMs: 220 });
    return;
  }
  if (state.phase === 'phase2_guess' || state.phase === 'phase2_draw' || state.phase === 'phase2_action') {
    sound.playBgm('phase2', { gain: 1, fadeMs: 220 });
    return;
  }
  if (state.phase === 'waiting') {
    return;
  }
  sound.playBgm('match', { gain: 1, fadeMs: 260 });
}

function isInWaitingRoom() {
  return state.phase === 'waiting' && state.roundNumber === 0;
}

function clearLeaveLobbyPendingTimer() {
  if (leaveLobbyPendingTimer) {
    clearTimeout(leaveLobbyPendingTimer);
    leaveLobbyPendingTimer = null;
  }
}

function renderReturnLobbyButton() {
  const btn = document.getElementById('btnReturnLobbyFromGameOver');
  if (!btn) return;
  btn.disabled = isLeavingLobbyFromGameOver;
  btn.textContent = isLeavingLobbyFromGameOver ? '正在退出...' : '返回大厅';
}

function setLeavingLobbyFromGameOver(pending) {
  isLeavingLobbyFromGameOver = pending;
  if (!pending) {
    clearLeaveLobbyPendingTimer();
  }
  renderReturnLobbyButton();
}

// ====================== WebSocket ======================
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws?token=${encodeURIComponent(token)}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'get_state' }));
    ws.send(JSON.stringify({ type: 'get_room_status' }));
  };

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    handleMessage(msg);
  };

  ws.onclose = (ev) => {
    if (ev.code === 4001) {
      sessionStorage.removeItem('token');
      sessionStorage.removeItem('username');
      window.location.href = '/';
      return;
    }
    setTimeout(connectWS, 2000);
  };
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function requestStateSync() {
  send({ type: 'get_state' });
}

function resolveWallRemainingFromFullState(msg) {
  const incoming = msg?.wall?.remaining;
  if (typeof incoming !== 'number') {
    return state.wallRemaining;
  }

  const sameRound = Number.isInteger(msg.round_number) && msg.round_number === state.roundNumber;
  const roundInProgress = !['waiting', 'round_start', 'round_end', 'game_over'].includes(state.phase);
  if (sameRound && roundInProgress && typeof state.wallRemaining === 'number' && state.wallRemaining > 0) {
    return Math.min(state.wallRemaining, incoming);
  }

  return incoming;
}

function ensureTimerTick() {
  if (timerTick) return;
  timerTick = setInterval(() => {
    // Before round start, timer should not tick down locally.
    if (state.phase === 'waiting' || state.phase === 'game_over') return;
    if (state.timerRemaining > 0) {
      state.timerRemaining -= 1;
      renderTimer();
    }
  }, 1000);
}

// ====================== Message Handler ======================
function handleMessage(msg) {
  switch (msg.type) {
    case 'game_state':
      applyFullState(msg);
      break;
    case 'round_start':
      onRoundStart(msg);
      break;
    case 'deal':
      onDeal(msg);
      break;
    case 'draw_tile':
      onDrawTile(msg);
      break;
    case 'opponent_draw':
      onOpponentDraw(msg);
      break;
    case 'discard':
      onDiscard(msg);
      break;
    case 'call_available':
      onCallAvailable(msg);
      break;
    case 'must_discard':
      onMustDiscard(msg);
      break;
    case 'call_made':
      onCallMade(msg);
      break;
    case 'chi':
    case 'pon':
      onCallMade({ ...msg, call_type: msg.type });
      break;
    case 'kan_declared':
      onKanDeclared(msg);
      break;
    case 'ankan':
    case 'minkan':
    case 'kakan':
      onKanDeclared({ ...msg, kan_type: msg.type });
      break;
    case 'tenpai_declared':
      onTenpaiDeclared(msg);
      break;
    case 'phase2_start':
      onPhase2Start(msg);
      break;
    case 'phase2_guess_request':
      onPhase2GuessRequest(msg);
      break;
    case 'phase2_guess_result':
      onPhase2GuessResult(msg);
      break;
    case 'phase2_draw':
      onPhase2Draw(msg);
      break;
    case 'phase2_discard':
      onPhase2Discard(msg);
      break;
    case 'phase2_draw_cycle_start':
      onPhase2DrawCycleStart(msg);
      break;
    case 'chankan_available':
      onCallAvailable({ calls: { can_ron: true }, discard_tile: msg.tile, discard_seat: msg.seat, is_chankan: true });
      break;
    case 'round_result':
      onRoundResult(msg);
      break;
    case 'round_ready':
      onRoundReady(msg);
      break;
    case 'tsumo':
    case 'ron':
    case 'draw':
      onRoundResult({ ...msg, result_type: msg.type });
      break;
    case 'game_over':
      onGameOver(msg);
      break;
    case 'room_status':
      onRoomStatus(msg);
      break;
    case 'room_left':
      setLeavingLobbyFromGameOver(false);
      window.location.href = '/lobby';
      break;
    case 'timer_update':
      state.timerRemaining = msg.remaining;
      state.isLastRound = msg.is_last_round;
      renderTimer();
      break;
    case 'error':
      setLeavingLobbyFromGameOver(false);
      showToast(msg.message);
      break;
  }
}

// ====================== State Updates ======================
function applyFullState(msg) {
  actions = msg.actions || {};
  state.mySeat = msg.my_seat;
  state.phase = msg.phase;
  state.myHand = msg.my_hand.closed || [];
  state.myDrawTile = msg.my_hand.draw_tile;
  state.myMelds = msg.my_hand.melds || [];
  state.myDiscards = msg.my_hand.discards || [];
  state.myPoints = msg.my_points;
  state.myDeclaredTenpai = msg.my_declared_tenpai;
  state.myDeclaredRiichi = !!msg.my_declared_riichi;
  state.oppClosedCount = msg.opponent_hand.closed_count || 0;
  state.oppMelds = msg.opponent_hand.melds || [];
  state.oppDiscards = msg.opponent_hand.discards || [];
  state.oppPoints = msg.opponent_points;
  state.oppName = msg.opponent_name;
  state.oppDeclaredTenpai = msg.opponent_declared_tenpai;
  state.oppDeclaredRiichi = !!msg.opponent_declared_riichi;
  state.myWaitingTiles = msg.my_waiting_tiles || [];
  state.dealerSeat = msg.dealer_seat;
  state.roundNumber = msg.round_number;
  state.wallRemaining = resolveWallRemainingFromFullState(msg);
  state.doraIndicators = msg.wall.dora_indicators || [];
  state.timerRemaining = msg.timer_remaining;
  state.isLastRound = msg.is_last_round;
  state.currentTurn = msg.current_turn;
  state.tenpaiDeclarer = msg.tenpai_declarer;
  state.honbaCount = msg.honba_count || 0;
  state.riichiSticks = msg.riichi_sticks || 0;
  state.phase2DrawCount = msg.phase2_draw_count || 0;
  state.roundReadySeats = msg.round_ready_seats || [];
  state.gameOverData = msg.phase === 'game_over' ? (msg.game_over_data || null) : null;
  state.phase2GuessedTypes = msg.phase2_guessed_types || [];
  if (typeof msg.timer_minutes === 'number') {
    state.roomTimerMinutes = msg.timer_minutes;
  }
  if (typeof msg.owner_seat === 'number') {
    state.roomOwnerSeat = msg.owner_seat;
  }
  if (msg.phase === 'phase2_guess' || msg.phase === 'phase2_draw' || msg.phase === 'phase2_action') {
    syncPhase2UiFromState();
  } else {
    resetPhase2Ui();
  }
  if (msg.phase === 'round_end' || msg.phase === 'game_over') {
    actions = {};
    selectedTile = null;
    hideActions();
  }
  if (msg.phase === 'round_end' && msg.round_result && !state.roundReadySeats.includes(state.mySeat)) {
    renderRoundResult(msg.round_result, {
      playSound: false,
      animateReveal: false,
      preserveRoundReadySeats: true,
      roundReadySeats: msg.round_ready_seats || [],
    });
    restoreActionsFromState();
    syncSceneAudio();
    return;
  }
  if (msg.phase === 'game_over' && msg.round_result && msg.game_over_data) {
    document.getElementById('gameOverOverlay').style.display = 'none';
    renderRoundResult(msg.round_result, {
      playSound: false,
      animateReveal: false,
      finalPhase: 'game_over',
      gameOverData: msg.game_over_data,
      preserveStatePoints: true,
    });
    restoreActionsFromState();
    syncSceneAudio();
    return;
  }
  if (msg.phase === 'game_over') {
    document.getElementById('gameOverOverlay').style.display = 'none';
    setResultOverlayStaticRestoreMode(true);
    document.getElementById('resultOverlay').style.display = 'flex';
    renderMatchOverPanel();
  }
  renderAll();
  restoreActionsFromState();
  syncSceneAudio();
}

function restoreActionsFromState() {
  hideActions();
  if ((state.phase === 'phase1_action' || state.phase === 'phase2_action')
      && state.currentTurn === state.mySeat && actions && Object.keys(actions).length > 0) {
    showActions();
    return;
  }
  if (state.phase === 'phase1_response' && actions && Object.keys(actions).length > 0) {
    showCallActions();
  }
}

function clearPhase2DrawTimer() {
  if (phase2DrawTimer) {
    clearTimeout(phase2DrawTimer);
    phase2DrawTimer = null;
  }
}

function clearPhase2ResumeKey() {
  phase2ResumeKey = null;
}

function resetPhase2Ui() {
  clearPhase2DrawTimer();
  clearPhase2ResumeKey();
  const draws = document.getElementById('phase2Draws');
  draws.style.display = 'none';
  draws.innerHTML = '';

  const phase2Status = document.getElementById('phase2Status');
  if (phase2Status) {
    phase2Status.style.display = 'none';
  }

  const guessPanel = document.getElementById('guessPanel');
  guessPanel.style.display = 'none';
  guessSelected.clear();
  guessMarked.clear();
  guessMode = 'select';
  guessPanelMinimized = false;
  phase2GuessMessage = '请选择2张牌进行猜测';
  updateGuessPanelMeta();
}

function phase2GuessMessageFromState() {
  const selectableCount = getGuessSelectableTypes().length;
  const requiredCount = Math.min(2, selectableCount);
  const retry = state.phase2DrawCount >= 5;
  if (requiredCount === 0) {
    return retry ? '5次摸牌结束，已无可选牌，可跳过本轮猜牌。' : '已经没有可选牌，可跳过本轮猜牌。';
  }
  if (requiredCount === 1) {
    return retry ? '5次摸牌结束，只剩1张牌可选，请按能选多少选多少。' : '只剩1张牌可选，请按能选多少选多少。';
  }
  return retry ? '5次摸牌结束，未和牌。请再次选择2张牌进行猜测。' : '请选择2张牌进行猜测';
}

function syncPhase2UiFromState() {
  const draws = document.getElementById('phase2Draws');
  const status = document.getElementById('phase2Status');
  const info = document.getElementById('phase2Info');
  const guessPanel = document.getElementById('guessPanel');

  draws.style.display = 'flex';
  if (status) {
    status.style.display = 'flex';
  }

  if (state.phase === 'phase2_guess') {
    clearPhase2DrawTimer();
    clearPhase2ResumeKey();
    if (info) {
      info.textContent = state.tenpaiDeclarer === state.mySeat ? '等待对手猜牌' : '请猜测对手的听牌';
    }
    if (state.tenpaiDeclarer === state.mySeat) {
      guessPanel.style.display = 'none';
      guessSelected.clear();
      updateGuessPanelMeta();
    } else {
      openGuessPanel(phase2GuessMessageFromState(), state.phase2GuessedTypes);
    }
    return;
  }

  if (state.phase === 'phase2_action') {
    clearPhase2DrawTimer();
    clearPhase2ResumeKey();
    guessPanel.style.display = 'none';
    guessSelected.clear();
    updateGuessPanelMeta();
    if (info) {
      info.textContent = state.tenpaiDeclarer === state.mySeat ? '请选择打牌或开杠' : '对手思考中...';
    }
    return;
  }

  guessPanel.style.display = 'none';
  guessSelected.clear();
  updateGuessPanelMeta();
  if (info) {
    if (state.tenpaiDeclarer === state.mySeat) {
      info.textContent = state.phase2DrawCount > 0 ? `摸牌中... 已摸${state.phase2DrawCount}次` : '摸牌中...';
    } else {
      info.textContent = '对手摸牌中...';
    }
  }

  if (state.tenpaiDeclarer === state.mySeat && state.phase2DrawCount < 5) {
    const resumeKey = `${state.roundNumber}:${state.phase2DrawCount}`;
    if (!phase2DrawTimer && phase2ResumeKey !== resumeKey) {
      phase2ResumeKey = resumeKey;
      phase2DrawTimer = setTimeout(() => {
        phase2DrawTimer = null;
        if (state.phase === 'phase2_draw' && state.tenpaiDeclarer === state.mySeat && state.phase2DrawCount < 5) {
          send({ type: 'phase2_next_draw' });
        }
      }, 900);
    }
  }
}

function onRoundStart(msg) {
  setLeavingLobbyFromGameOver(false);
  sound.resetRound();
  sound.play('roundStart');
  state.phase = 'round_start';
  state.dealerSeat = msg.dealer_seat;
  state.currentTurn = msg.current_turn ?? msg.dealer_seat;
  state.roundNumber = msg.round_number;
  state.wallRemaining = msg.wall_remaining;
  state.doraIndicators = msg.dora_indicators || [];
  state.isLastRound = msg.is_last_round;
  state.honbaCount = msg.honba_count || 0;
  state.riichiSticks = msg.riichi_sticks || 0;
  state.myDiscards = [];
  state.oppDiscards = [];
  state.myMelds = [];
  state.oppMelds = [];
  state.myHand = [];
  state.myDrawTile = null;
  state.myDeclaredTenpai = false;
  state.myDeclaredRiichi = false;
  state.oppDeclaredTenpai = false;
  state.oppDeclaredRiichi = false;
  state.tenpaiDeclarer = null;
  state.phase2DrawCount = 0;
  state.phase2GuessedTypes = [];
  state.roundReadySeats = [];
  state.roomPlayers = [];
  state.roomReadyBySeat = {};
  state.gameOverData = null;
  selectedTile = null;
  actions = {};
  roomAudioState.playerCount = 0;
  roomAudioState.myReady = null;
  roomAudioState.oppReady = null;
  resetPhase2Ui();
  hideActions();
  document.getElementById('resultOverlay').style.display = 'none';
  hideMatchOverPanel();
  renderAll();
  syncSceneAudio();
}

function onRoomStatus(msg) {
  const playerCount = (msg.players || []).length;
  state.roomPlayers = msg.players || [];
  const readyMap = {};
  for (const p of state.roomPlayers) {
    readyMap[p.seat] = !!p.ready;
  }
  state.roomReadyBySeat = readyMap;
  state.roomOwnerSeat = Number.isInteger(msg.owner_seat) ? msg.owner_seat : null;
  state.roomTimerMinutes = Number.isInteger(msg.timer_minutes) ? msg.timer_minutes : state.roomTimerMinutes;
  const myReady = Number.isInteger(state.mySeat) && state.mySeat >= 0 ? !!readyMap[state.mySeat] : false;
  const oppSeat = Number.isInteger(state.mySeat) && state.mySeat >= 0 ? 1 - state.mySeat : null;
  const oppReady = oppSeat !== null ? !!readyMap[oppSeat] : false;
  const inWaitingRoom = isInWaitingRoom();

  if (inWaitingRoom) {
    sound.playBgm('ready', { gain: 1, fadeMs: 180 });
    if (roomAudioState.playerCount === 1 && playerCount === 2) {
      sound.play('matchFound');
    }
    if (roomAudioState.myReady !== null && roomAudioState.myReady !== myReady) {
      sound.play(myReady ? 'roomReadyOn' : 'roomReadyOff');
    }
    if (roomAudioState.oppReady !== null && roomAudioState.oppReady !== oppReady) {
      sound.play(oppReady ? 'roomReadyOn' : 'roomReadyOff');
    }
  }

  roomAudioState.playerCount = playerCount;
  roomAudioState.myReady = myReady;
  roomAudioState.oppReady = oppReady;
  renderSceneMode();
  renderRoomReadyBar();
  renderMatchOverPanel();
}

function onDeal(msg) {
  // Receive dealt hand (13 tiles)
  state.myHand = msg.hand.closed || [];
  state.myDrawTile = null;
  state.oppClosedCount = msg.opponent_closed_count || 13;
  renderAll();
}

function onDrawTile(msg) {
  sound.play('drawSelf');
  // I drew a tile
  state.phase = msg.phase || 'phase1_action';
  if (typeof msg.wall_remaining === 'number') {
    state.wallRemaining = msg.wall_remaining;
  }
  state.myDrawTile = msg.tile;
  if (!state.myHand.includes(msg.tile)) {
    state.myHand.push(msg.tile);
  }
  actions = msg.actions || {};
  state.myWaitingTiles = msg.waiting_tiles || state.myWaitingTiles || [];
  state.currentTurn = state.mySeat;
  if (state.phase === 'phase2_action') {
    clearPhase2DrawTimer();
    clearPhase2ResumeKey();
    const status = document.getElementById('phase2Status');
    if (status) {
      status.style.display = 'flex';
      document.getElementById('phase2Info').textContent = actions.can_tsumo
        ? '可自摸，或暗打当前摸牌继续追高目'
        : '请选择打出当前摸牌或开杠';
    }
  }
  renderMyHand();
  renderTurnIndicator();
  showActions();
}

function onOpponentDraw(msg) {
  sound.play('drawOpponent');
  state.wallRemaining = msg.wall_remaining;
  state.oppClosedCount = (state.oppClosedCount || 0) + 1;
  state.currentTurn = msg.seat;
  hideActions();
  renderInfoBar();
  renderOpponent();
  renderTurnIndicator();
}

function onDiscard(msg) {
  const tile = Number(msg.tile);
  state.wallRemaining = msg.wall_remaining;
  sound.play(msg.seat === state.mySeat ? 'discardSelf' : 'discardOpponent');

  if (msg.seat === state.mySeat) {
    // My discard
    const idx = state.myHand.indexOf(tile);
    if (idx >= 0) state.myHand.splice(idx, 1);
    state.myDrawTile = null;
    state.myDiscards.push(tile);
    selectedTile = null;
    hideActions();
  } else {
    // Opponent discard
    state.oppDiscards.push(tile);
    if (state.oppClosedCount > 0) state.oppClosedCount--;
  }
  renderAll();
}

function ensureDiscardVisible(discardSeat, tile) {
  const seat = Number(discardSeat);
  const tid = Number(tile);
  if (!Number.isInteger(seat) || !Number.isInteger(tid)) return;

  if (seat === state.mySeat) {
    if (!state.myDiscards.includes(tid)) {
      state.myDiscards.push(tid);
    }
    state.myDrawTile = null;
    return;
  }

  if (!state.oppDiscards.includes(tid)) {
    state.oppDiscards.push(tid);
    if (state.oppClosedCount > 0) state.oppClosedCount--;
  }
}

function onCallAvailable(msg) {
  sound.play('actionPrompt');
  state.phase = 'phase1_response';
  // Fallback reconciliation: if discard event is delayed/missed, keep pond UI consistent.
  if (!msg.is_chankan) {
    ensureDiscardVisible(msg.discard_seat, msg.discard_tile);
  }
  actions = msg.calls || {};
  actions._discard_tile = msg.discard_tile;
  actions._discard_seat = msg.discard_seat;
  actions._is_chankan = !!msg.is_chankan;
  renderDiscards();
  renderOpponent();
  renderInfoBar();
  showCallActions();
}

function onMustDiscard(msg) {
  if (msg.seat === state.mySeat) {
    sound.play('actionPrompt');
  }
  // After chi/pon, I must discard
  state.phase = msg.phase || 'phase1_action';
  state.currentTurn = msg.seat;
  actions = {
    must_discard: true,
    tenpai_discards: msg.tenpai_discards || null,
    tenpai_mode: msg.tenpai_mode || null,
    can_ankan: msg.can_ankan || [],
    can_kakan: msg.can_kakan || [],
    can_declare_tenpai: !!msg.can_declare_tenpai,
    can_declare_riichi: !!msg.can_declare_riichi,
    can_declare_damaten: !!msg.can_declare_damaten,
  };
  renderMyHand();
  renderTurnIndicator();
  showActions();
}

function onCallMade(msg) {
  const callType = msg.call_type || msg.type;
  sound.play('callMade', { callType, myAction: msg.seat === state.mySeat });
  state.currentTurn = msg.seat;
  state.phase = 'phase1_action';
  hideActions();

  const meld = { type: callType, tiles: msg.tiles, called_tile: msg.called_tile };
  if (msg.seat === state.mySeat) {
    state.myMelds.push(meld);
    // Remove meld tiles from closed hand
    for (const t of msg.tiles) {
      if (t !== msg.called_tile) {
        const idx = state.myHand.indexOf(t);
        if (idx >= 0) state.myHand.splice(idx, 1);
      }
    }
    // Also remove the called tile from the opponent's discard
    const didx = state.oppDiscards.lastIndexOf(msg.called_tile);
    if (didx >= 0) state.oppDiscards.splice(didx, 1);
  } else {
    state.oppMelds.push(meld);
    // Opponent used tiles from closed hand for the call
    // chi/pon: 2 tiles from closed; minkan: 3 tiles from closed
    const usedFromClosed = msg.tiles.filter(t => t !== msg.called_tile).length;
    state.oppClosedCount = Math.max(0, state.oppClosedCount - usedFromClosed);
    // Remove the called tile from my discards
    const didx = state.myDiscards.lastIndexOf(msg.called_tile);
    if (didx >= 0) state.myDiscards.splice(didx, 1);
  }
  renderAll();
}

function onKanDeclared(msg) {
  const kanType = msg.kan_type || msg.type;
  sound.play('callMade', { callType: kanType, myAction: msg.seat === state.mySeat });
  state.doraIndicators = msg.dora_indicators || state.doraIndicators;
  if (msg.seat === state.mySeat) {
    if (kanType === 'ankan') {
      state.myMelds.push({ type: kanType, tiles: msg.tiles, called_tile: null });
      for (const t of msg.tiles) {
        const idx = state.myHand.indexOf(t);
        if (idx >= 0) state.myHand.splice(idx, 1);
      }
    } else if (kanType === 'minkan') {
      state.myMelds.push({ type: kanType, tiles: msg.tiles, called_tile: msg.called_tile ?? null });
      for (const t of msg.tiles) {
        const idx = state.myHand.indexOf(t);
        if (idx >= 0) state.myHand.splice(idx, 1);
      }
    } else if (kanType === 'kakan') {
      // Upgrade existing pon to kakan: find pon meld and update it
      const tt = Math.floor(msg.tiles[0] / 4);
      for (let i = 0; i < state.myMelds.length; i++) {
        const m = state.myMelds[i];
        if (m.type === 'pon' && Math.floor(m.tiles[0] / 4) === tt) {
          state.myMelds[i] = {
            type: 'kakan',
            tiles: msg.tiles,
            called_tile: msg.called_tile ?? m.called_tile ?? null,
            added_tile: msg.added_tile ?? msg.tiles[msg.tiles.length - 1],
          };
          break;
        }
      }
      // Remove the extra tile from closed hand
      const extraTile = msg.tiles[msg.tiles.length - 1];
      const idx = state.myHand.indexOf(extraTile);
      if (idx >= 0) state.myHand.splice(idx, 1);
    }
  } else {
    if (kanType === 'ankan') {
      state.oppMelds.push({ type: kanType, tiles: msg.tiles, called_tile: null });
      state.oppClosedCount = Math.max(0, state.oppClosedCount - 4);
    } else if (kanType === 'minkan') {
      state.oppMelds.push({ type: kanType, tiles: msg.tiles, called_tile: msg.called_tile ?? null });
      state.oppClosedCount = Math.max(0, state.oppClosedCount - 3);
    } else if (kanType === 'kakan') {
      // Upgrade existing pon meld for opponent
      const tt = Math.floor(msg.tiles[0] / 4);
      for (let i = 0; i < state.oppMelds.length; i++) {
        const m = state.oppMelds[i];
        if (m.type === 'pon' && Math.floor(m.tiles[0] / 4) === tt) {
          state.oppMelds[i] = {
            type: 'kakan',
            tiles: msg.tiles,
            called_tile: msg.called_tile ?? m.called_tile ?? null,
            added_tile: msg.added_tile ?? msg.tiles[msg.tiles.length - 1],
          };
          break;
        }
      }
      state.oppClosedCount = Math.max(0, state.oppClosedCount - 1);
    }
  }
  renderAll();
}

function onTenpaiDeclared(msg) {
  if (msg.points) {
    state.myPoints = msg.points[state.mySeat] ?? state.myPoints;
    state.oppPoints = msg.points[1 - state.mySeat] ?? state.oppPoints;
  }
  state.honbaCount = msg.honba_count ?? state.honbaCount;
  state.riichiSticks = msg.riichi_sticks ?? state.riichiSticks;
  if (msg.seat === state.mySeat) {
    sound.play('tenpaiSelf');
    state.myDeclaredTenpai = true;
    state.myDeclaredRiichi = !!msg.riichi;
    showToast(msg.riichi ? '你已立直，请打出一张保持听牌的牌' : '你宣告了听牌，请打出一张保持听牌的牌', 'success');
  } else {
    sound.play('tenpaiOpponent');
    state.oppDeclaredTenpai = true;
    state.oppDeclaredRiichi = !!msg.riichi;
    showToast(msg.riichi ? '对手立直了！' : '对手宣告了听牌！', 'danger');
  }
  state.tenpaiDeclarer = msg.seat;
  renderAll();
}

function onPhase2Start(msg) {
  sound.play('phase2Start');
  state.phase = 'phase2_guess';
  state.tenpaiDeclarer = msg.tenpai_declarer;
  state.currentTurn = msg.guesser;
  state.phase2DrawCount = 0;
  clearPhase2DrawTimer();
  clearPhase2ResumeKey();
  document.getElementById('phase2Draws').style.display = 'flex';
  document.getElementById('phase2Draws').innerHTML = '';
  // [R2-5] Show phase 2 status
  const status = document.getElementById('phase2Status');
  if (status) {
    status.style.display = 'flex';
    document.getElementById('phase2Info').textContent =
      msg.tenpai_declarer === state.mySeat ? '等待对手猜牌' : '请猜测对手的听牌';
  }
  if (msg.tenpai_declarer === state.mySeat) {
    showToast('进入第二阶段 - 等待对手猜牌', 'warning');
  } else {
    showToast('进入第二阶段 - 请猜测对手的听牌', 'warning');
  }
  renderTurnIndicator();
  syncSceneAudio();
}

function onPhase2GuessRequest(msg) {
  state.phase = 'phase2_guess';
  state.currentTurn = state.mySeat;
  if (state.tenpaiDeclarer !== state.mySeat) {
    sound.play('actionPrompt');
    state.phase2GuessedTypes = msg.already_guessed || state.phase2GuessedTypes || [];
    openGuessPanel(msg.message, state.phase2GuessedTypes);
  }
  renderTurnIndicator();
}

function onPhase2GuessResult(msg) {
  sound.play(msg.hit ? 'guessHit' : 'guessMiss');
  if (msg.guesser === state.mySeat) {
    state.phase2GuessedTypes = msg.already_guessed || msg.guessed || state.phase2GuessedTypes || [];
  }
  const names = (msg.guessed_names || []).join('、');
  if (msg.skipped) {
    showToast('已无可选牌，跳过本轮猜牌。');
  } else if (msg.hit) {
    showToast(`猜中了！猜测: ${names}`, 'success');
  } else {
    showToast(`未猜中。猜测: ${names}`, 'danger');
  }
}

function onPhase2DrawCycleStart(msg) {
  state.phase = 'phase2_draw';
  state.currentTurn = msg.declarer;
  state.phase2DrawCount = 0;
  clearPhase2DrawTimer();
  clearPhase2ResumeKey();
  const container = document.getElementById('phase2Draws');
  container.style.display = 'flex';
  container.innerHTML = '';
  // Update phase2 status
  const status = document.getElementById('phase2Status');
  if (status) {
    status.style.display = 'flex';
    document.getElementById('phase2Info').textContent =
      msg.declarer === state.mySeat ? '摸牌中...' : '对手摸牌中...';
  }
  renderTurnIndicator();
  if (msg.declarer === state.mySeat) {
    send({ type: 'phase2_next_draw' });
  }
}

function onPhase2Draw(msg) {
  sound.play('phase2Draw');
  state.phase2DrawCount = msg.draw_number;
  clearPhase2ResumeKey();
  const container = document.getElementById('phase2Draws');
  container.style.display = 'flex';
  const tile = Number(msg.tile);
  const el = Number.isInteger(tile)
    ? createTileElement(tile, { size: 'small' })
    : createTileElement(null, { size: 'small' });
  container.appendChild(el);
  state.wallRemaining = msg.wall_remaining;
  renderInfoBar();

  const status = document.getElementById('phase2Status');
  if (status && status.style.display !== 'none') {
    document.getElementById('phase2Info').textContent =
      msg.declarer === state.mySeat
        ? `第${msg.draw_number}次摸牌，请自行决定是否自摸`
        : `对手第${msg.draw_number}次摸牌中`;
  }
  // do NOT request next draw here; wait for phase2_discard
}

function onPhase2Discard(msg) {
  clearPhase2ResumeKey();
  const tile = Number(msg.tile);
  const hasVisibleTile = Number.isInteger(tile);
  const remaining = msg.draws_remaining;

  if (msg.declarer === state.mySeat) {
    const discardedTile = hasVisibleTile ? tile : state.myDrawTile;
    const idx = state.myHand.indexOf(discardedTile);
    if (idx >= 0) state.myHand.splice(idx, 1);
    state.myDrawTile = null;
    if (hasVisibleTile) {
      state.myDiscards.push(tile);
    }
    selectedTile = null;
    hideActions();
  } else {
    if (hasVisibleTile && !state.oppDiscards.includes(tile)) {
      state.oppDiscards.push(tile);
    }
  }

  state.phase = remaining > 0 ? 'phase2_draw' : 'phase2_guess';
  state.currentTurn = remaining > 0 ? msg.declarer : (msg.declarer === 0 ? 1 : 0);

  if (remaining > 0 && msg.declarer === state.mySeat) {
    clearPhase2DrawTimer();
    phase2DrawTimer = setTimeout(() => {
      send({ type: 'phase2_next_draw' });
    }, 1500);
  } else {
    clearPhase2DrawTimer();
  }
  // Update phase 2 status
  const status = document.getElementById('phase2Status');
  if (status && status.style.display !== 'none') {
    document.getElementById('phase2Info').textContent =
      remaining > 0
        ? `摸牌中... 剩余${remaining}次`
        : (msg.declarer === state.mySeat ? '等待对手猜牌' : '请猜测对手的听牌');
  }

  if (msg.hidden_discard) {
    showToast(msg.declarer === state.mySeat ? '已放弃本次和牌，暗打当前摸牌' : '对手已处理本次摸牌');
  }

  if (remaining === 0) {
    if (msg.declarer === state.mySeat) {
      document.getElementById('guessPanel').style.display = 'none';
      guessSelected.clear();
      updateGuessPanelMeta();
    } else {
      openGuessPanel(phase2GuessMessageFromState(), state.phase2GuessedTypes);
    }
  }
  renderMyHand();
  renderDiscards();
  renderTurnIndicator();
}

function onRoundReady(msg) {
  state.roundReadySeats = msg.ready_seats || [];
  renderAll();
}

function ensureResultHandTrack(container) {
  let track = container.querySelector('.result-hand-track');
  if (!track) {
    track = document.createElement('div');
    track.className = 'result-hand-track';
    container.appendChild(track);
  }
  return track;
}

function appendResultHand(container, handData, winningTile = null) {
  if (!handData) return;

  const track = ensureResultHandTrack(container);
  const resultTileSize = 'mini';

  let highlighted = false;
  for (const t of (handData.closed || [])) {
    const tileEl = createTileElement(t, { size: resultTileSize });
    if (!highlighted && winningTile !== null && t === winningTile) {
      tileEl.classList.add('winning-tile');
      highlighted = true;
    }
    track.appendChild(tileEl);
  }

  if (handData.melds) {
    for (const meld of handData.melds) {
      const sep = document.createElement('span');
      sep.style.width = '6px';
      sep.style.flex = '0 0 auto';
      track.appendChild(sep);
      track.appendChild(renderMeldGroup(meld, { size: resultTileSize }));
    }
  }
}

function renderResultIndicators(container, doraIndicators = [], uradoraIndicators = []) {
  container.innerHTML = '';
  container.style.display = 'none';

  const sections = [];
  if (Array.isArray(doraIndicators) && doraIndicators.length > 0) {
    sections.push({ label: '宝牌指示牌', tiles: doraIndicators });
  }
  if (Array.isArray(uradoraIndicators) && uradoraIndicators.length > 0) {
    sections.push({ label: '里宝牌指示牌', tiles: uradoraIndicators });
  }

  if (sections.length === 0) {
    return;
  }

  container.style.display = 'flex';
  for (const section of sections) {
    const row = document.createElement('div');
    row.className = 'result-dora-row';

    const label = document.createElement('span');
    label.className = 'result-dora-label';
    label.textContent = section.label;
    row.appendChild(label);

    for (const tile of section.tiles) {
      row.appendChild(createTileElement(tile, { size: 'small' }));
    }

    container.appendChild(row);
  }
}

function renderRoundResult(msg, options = {}) {
  const {
    playSound: shouldPlaySound = true,
    animateReveal = true,
    preserveRoundReadySeats = false,
    roundReadySeats = [],
    finalPhase = 'round_end',
    gameOverData = null,
    preserveStatePoints = false,
  } = options;
  state.phase = finalPhase;
  state.currentTurn = -1;
  state.phase2DrawCount = 0;
  state.roundReadySeats = preserveRoundReadySeats ? [...roundReadySeats] : [];
  state.honbaCount = msg.honba_count ?? state.honbaCount;
  state.riichiSticks = msg.riichi_sticks ?? state.riichiSticks;
  actions = {};
  selectedTile = null;
  resetPhase2Ui();
  hideActions();

  const resultType = msg.result_type || msg.type;
  if (shouldPlaySound && (resultType === 'tsumo' || resultType === 'ron')) {
    sound.play(msg.winner === state.mySeat ? 'resultWin' : 'resultLose');
  } else if (shouldPlaySound && resultType === 'draw') {
    sound.play('resultDraw');
  }
  const overlay = document.getElementById('resultOverlay');
  const box = overlay.querySelector('.result-box');
  const title = document.getElementById('resultTitle');
  const hand = document.getElementById('resultHand');
  const dora = document.getElementById('resultDora');
  const yakuList = document.getElementById('resultYaku');
  const score = document.getElementById('resultScore');
  const points = document.getElementById('resultPoints');

  setResultOverlayStaticRestoreMode(!animateReveal);
  hand.innerHTML = '';
  dora.innerHTML = '';
  dora.style.display = 'none';
  yakuList.innerHTML = '';
  resetResultRevealStages();
  if (finalPhase === 'game_over') {
    setLeavingLobbyFromGameOver(false);
    state.gameOverData = gameOverData;
  } else {
    hideMatchOverPanel();
    state.gameOverData = null;
  }

  const resultDoraIndicators = msg.dora_indicators || state.doraIndicators || [];
  const resultUradoraIndicators = msg.uradora_indicators || msg.score?.uradora_indicators || [];
  renderResultIndicators(dora, resultDoraIndicators, resultUradoraIndicators);

  const oldMyPoints = state.myPoints;
  const oldOppPoints = state.oppPoints;
  const myNewPts = msg.points?.[state.mySeat] ?? oldMyPoints;
  const oppNewPts = msg.points?.[1 - state.mySeat] ?? oldOppPoints;
  const myDeltaFromPayload = msg.points_delta?.[state.mySeat];
  const oppDeltaFromPayload = msg.points_delta?.[1 - state.mySeat];
  const myDelta = Number.isInteger(myDeltaFromPayload) ? myDeltaFromPayload : (myNewPts - oldMyPoints);
  const oppDelta = Number.isInteger(oppDeltaFromPayload) ? oppDeltaFromPayload : (oppNewPts - oldOppPoints);

  if (resultType === 'tsumo' || resultType === 'ron') {
    const isMyWin = msg.winner === state.mySeat;
    const winnerName = isMyWin ? '你' : state.oppName;
    const typeName = resultType === 'tsumo' ? '自摸' : '荣和';
    title.textContent = `${winnerName} ${typeName}！`;
    title.className = isMyWin ? 'result-win' : 'result-lose';

    // Show winning hand
    appendResultHand(hand, msg.hand, msg.win_tile);

    // Yaku list with han count [U6]
    if (msg.score && msg.score.yaku) {
      for (const y of msg.score.yaku) {
        const item = document.createElement('div');
        item.className = 'yaku-item';
        const nameSpan = document.createElement('span');
        const hanSpan = document.createElement('span');
        hanSpan.className = 'yaku-han';
        nameSpan.textContent = translateYaku(y);
        hanSpan.textContent = yakuHanLabel(y);
        item.appendChild(nameSpan);
        item.appendChild(hanSpan);
        yakuList.appendChild(item);
      }
    }

    const sc = msg.score || {};
    const handPoints = Math.max(0, (msg.points_transfer || 0) - (msg.honba_bonus || 0));
    score.innerHTML = formatWinScoreBreakdown({
      han: sc.han || 0,
      fu: sc.fu || 0,
      handPoints,
      honbaBonus: msg.honba_bonus || 0,
      riichiBonus: msg.riichi_bonus || 0,
      totalGain: msg.points_delta?.[msg.winner] || 0,
    });
    points.innerHTML = formatPointsRows(myNewPts, oppNewPts, myDelta, oppDelta);
  } else if (resultType === 'draw') {
    // Draw
    title.textContent = '流局';
    title.className = 'result-draw';
    let reason = '（牌山摸完）';
    if (msg.reason === 'phase2_guess_hit') {
      reason = '（猜中听牌）';
    } else if (msg.reason === 'four_kan_abort') {
      reason = '（四杠散了）';
    } else if (msg.reason === 'nagashi_mangan') {
      if (Number.isInteger(msg.winner)) {
        const isMyWin = msg.winner === state.mySeat;
        const winnerName = isMyWin ? '你' : (msg.winner_name || state.oppName);
        title.textContent = `${winnerName} 流局满贯！`;
        title.className = isMyWin ? 'result-win' : 'result-lose';

        if (msg.score && msg.score.yaku) {
          for (const y of msg.score.yaku) {
            const item = document.createElement('div');
            item.className = 'yaku-item';
            const nameSpan = document.createElement('span');
            const hanSpan = document.createElement('span');
            hanSpan.className = 'yaku-han';
            nameSpan.textContent = translateYaku(y);
            hanSpan.textContent = yakuHanLabel(y);
            item.appendChild(nameSpan);
            item.appendChild(hanSpan);
            yakuList.appendChild(item);
          }
        }

        const sc = msg.score || {};
        const handPoints = Math.max(0, (msg.points_transfer || 0) - (msg.honba_bonus || 0));
        score.innerHTML = formatWinScoreBreakdown({
          han: sc.han || 0,
          fu: sc.fu || 0,
          handPoints,
          honbaBonus: msg.honba_bonus || 0,
          riichiBonus: msg.riichi_bonus || 0,
          totalGain: msg.points_delta?.[msg.winner] || 0,
        });
      } else {
        reason = `（双家流局满贯：${(msg.nagashi_names || []).join('、')}）`;
      }
    }
    if (!Number.isInteger(msg.winner) || msg.reason !== 'nagashi_mangan') {
      score.textContent = reason;
    }

    const t0 = msg.tenpai?.[0] ? '听牌' : '未听';
    const t1 = msg.tenpai?.[1] ? '听牌' : '未听';
    const myTenpai = state.mySeat === 0 ? t0 : t1;
    const oppTenpai = state.mySeat === 0 ? t1 : t0;

    if (msg.reason === 'phase2_guess_hit' && msg.revealed_hand) {
      const revealLabel = document.createElement('div');
      revealLabel.className = 'result-hand-label';
      revealLabel.textContent = msg.revealed_seat === state.mySeat
        ? '你的听牌手牌已公开'
        : `${msg.revealed_name || state.oppName}的听牌手牌已公开`;
      hand.appendChild(revealLabel);
      appendResultHand(hand, msg.revealed_hand);
    }

    if (msg.reason === 'nagashi_mangan' && Number.isInteger(msg.winner)) {
      const winnerItem = document.createElement('div');
      winnerItem.className = 'yaku-item';
      winnerItem.innerHTML = `<span>和了者</span><span>${msg.winner === state.mySeat ? '你' : (msg.winner_name || state.oppName)}</span>`;
      yakuList.appendChild(winnerItem);
    } else if (msg.reason === 'nagashi_mangan') {
      yakuList.innerHTML = `
        <div class="yaku-item"><span>流局满贯</span><span>${(msg.nagashi_names || []).join('、') || '无人'}</span></div>
        <div class="yaku-item"><span>你</span><span>${myTenpai}</span></div>
        <div class="yaku-item"><span>${state.oppName}</span><span>${oppTenpai}</span></div>
      `;
    } else {
      yakuList.innerHTML = msg.reason === 'phase2_guess_hit' && msg.revealed_hand
      ? `
        <div class="yaku-item"><span>被猜中者</span><span>${msg.revealed_seat === state.mySeat ? '你' : (msg.revealed_name || state.oppName)}</span></div>
        <div class="yaku-item"><span>你</span><span>${myTenpai}</span></div>
        <div class="yaku-item"><span>${state.oppName}</span><span>${oppTenpai}</span></div>
      `
      : `
        <div class="yaku-item"><span>你</span><span>${myTenpai}</span></div>
        <div class="yaku-item"><span>${state.oppName}</span><span>${oppTenpai}</span></div>
      `;
    }
    points.innerHTML = formatPointsRows(myNewPts, oppNewPts, myDelta, oppDelta);
  } else {
    title.textContent = '结算信息';
    title.className = 'result-draw';
    score.textContent = `未知结算类型：${msg.type || 'unknown'}`;
    points.innerHTML = formatPointsRows(myNewPts, oppNewPts, myDelta, oppDelta);
  }

  const resultTileCount = hand.querySelectorAll('.tile').length;
  box.classList.toggle('compact', yakuList.children.length >= 6 || resultTileCount >= 14 || dora.childElementCount >= 2);

  // Update points
  if (msg.points && !preserveStatePoints) {
    state.myPoints = myNewPts;
    state.oppPoints = oppNewPts;
  }

  overlay.style.display = 'flex';
  renderAll();
  if (animateReveal) {
    playResultRevealStages();
  } else {
    completeResultRevealStages();
  }
}

function onRoundResult(msg) {
  renderRoundResult(msg, { playSound: true });
}

function onGameOver(msg) {
  setLeavingLobbyFromGameOver(false);
  state.phase = 'game_over';
  state.currentTurn = -1;
  state.phase2DrawCount = 0;
  state.roundReadySeats = [];
  state.honbaCount = msg.honba_count ?? state.honbaCount;
  state.riichiSticks = msg.riichi_sticks ?? state.riichiSticks;
  state.gameOverData = msg;
  actions = {};
  selectedTile = null;
  resetPhase2Ui();
  hideActions();
  sound.stopBgm({ fadeMs: 220 });
  sound.play(msg.winner === state.mySeat ? 'gameWin' : 'gameLose');
  document.getElementById('gameOverOverlay').style.display = 'none';
  setResultOverlayStaticRestoreMode(false);
  document.getElementById('resultOverlay').style.display = 'flex';
  renderMatchOverPanel();
  renderAll();
}

function hideMatchOverPanel() {
  setLeavingLobbyFromGameOver(false);
  const panel = document.getElementById('matchOverPanel');
  const continueBtn = document.getElementById('resultContinue');
  if (panel) {
    panel.style.display = 'none';
  }
  if (continueBtn) {
    continueBtn.style.display = 'inline-flex';
  }
}

function renderMatchOverPanel() {
  const panel = document.getElementById('matchOverPanel');
  const continueBtn = document.getElementById('resultContinue');
  if (!panel || state.phase !== 'game_over') {
    hideMatchOverPanel();
    return;
  }

  const gameOver = state.gameOverData || {};
  const winnerSeat = Number.isInteger(gameOver.winner)
    ? gameOver.winner
    : ((state.myPoints >= state.oppPoints) ? state.mySeat : (1 - state.mySeat));
  const isWinner = winnerSeat === state.mySeat;
  const finalPoints = gameOver.final_points || {};
  const myPts = finalPoints[state.mySeat] ?? state.myPoints;
  const oppPts = finalPoints[1 - state.mySeat] ?? state.oppPoints;
  const myReady = !!state.roomReadyBySeat[state.mySeat];
  const oppSeat = state.mySeat >= 0 ? 1 - state.mySeat : null;
  const oppReady = oppSeat !== null ? !!state.roomReadyBySeat[oppSeat] : false;
  const playerCount = (state.roomPlayers || []).length;
  const isOwner = state.roomOwnerSeat === state.mySeat;

  document.getElementById('matchOverTitle').textContent = isWinner ? '本场结束，你获胜' : '本场结束，对手获胜';
  document.getElementById('matchOverSubtitle').textContent = isOwner
    ? `你是房主。可将下一场时长调整为 ${state.roomTimerMinutes} 分钟后继续准备。`
    : `房主将决定下一场时长。当前配置：${state.roomTimerMinutes} 分钟。`;
  document.getElementById('matchOverPoints').innerHTML = `
    <div class="match-over-point-row"><span>你</span><strong>${myPts}</strong></div>
    <div class="match-over-point-row"><span>${state.oppName}</span><strong>${oppPts}</strong></div>
  `;

  const timerField = document.getElementById('matchOverTimerField');
  const timerInput = document.getElementById('rematchTimerMinutes');
  const applyBtn = document.getElementById('btnApplyRematchTimer');
  if (timerInput) {
    timerInput.value = String(state.roomTimerMinutes || 30);
    timerInput.disabled = !isOwner;
  }
  if (timerField) {
    timerField.style.display = isOwner ? 'flex' : 'none';
  }
  if (applyBtn) {
    applyBtn.style.display = isOwner ? 'inline-flex' : 'none';
    applyBtn.disabled = !isOwner;
  }

  const statusEl = document.getElementById('matchOverStatus');
  if (playerCount < 2) {
    statusEl.textContent = '等待对手留在房间后再准备下一场。';
  } else if (myReady && oppReady) {
    statusEl.textContent = '双方已准备，正在开下一场...';
  } else if (myReady) {
    statusEl.textContent = '已准备，等待对手准备。';
  } else if (oppReady) {
    statusEl.textContent = '对手已准备，等待你准备。';
  } else {
    statusEl.textContent = isOwner ? '先确认下一场时长，再点准备即可开下一场。' : '等待房主确认时长后，点击准备加入下一场。';
  }

  const readyBtn = document.getElementById('btnRematchReady');
  const unreadyBtn = document.getElementById('btnRematchUnready');
  readyBtn.style.display = myReady ? 'none' : 'inline-flex';
  unreadyBtn.style.display = myReady ? 'inline-flex' : 'none';
  renderReturnLobbyButton();

  panel.style.display = 'flex';
  if (continueBtn) {
    continueBtn.style.display = 'none';
  }
}

function applyRematchTimer() {
  const input = document.getElementById('rematchTimerMinutes');
  const minutes = parseInt(input?.value || '', 10);
  if (!Number.isInteger(minutes) || minutes < 5 || minutes > 180) {
    showToast('下一场时长需在 5 到 180 分钟之间');
    return;
  }
  send({ type: 'room_set_timer', timer_minutes: minutes });
}

function returnToLobbyFromGameOver() {
  if (isLeavingLobbyFromGameOver) return;
  sound.play('uiCancel');
  setLeavingLobbyFromGameOver(true);
  send({ type: 'leave_room' });
  leaveLobbyPendingTimer = setTimeout(() => {
    if (!isLeavingLobbyFromGameOver) return;
    setLeavingLobbyFromGameOver(false);
    showToast('退出房间超时，请重试');
  }, 4000);
}

function confirmNextRound() {
  sound.play('uiConfirm');
  resetResultRevealStages();
  document.getElementById('resultOverlay').style.display = 'none';
  resetPhase2Ui();
  if (state.phase === 'round_end' && !state.roundReadySeats.includes(state.mySeat)) {
    state.roundReadySeats = [...new Set([...state.roundReadySeats, state.mySeat])];
    send({ type: 'ready' });
  }
  renderAll();
}

function clearResultRevealTimers() {
  for (const timerId of resultRevealTimers) {
    clearTimeout(timerId);
  }
  resultRevealTimers = [];
}

function setResultOverlayStaticRestoreMode(isStatic) {
  const overlay = document.getElementById('resultOverlay');
  if (!overlay) return;
  overlay.classList.toggle('result-restore-static', !!isStatic);
}

function resetResultRevealStages() {
  clearResultRevealTimers();
  const title = document.getElementById('resultTitle');
  const yakuList = document.getElementById('resultYaku');
  const score = document.getElementById('resultScore');
  const points = document.getElementById('resultPoints');
  const stages = [title, yakuList, score, points];
  for (const el of stages) {
    if (!el) continue;
    el.classList.remove('reveal-in', 'result-stage', 'result-title-stage');
    el.style.transitionDelay = '0ms';
  }
}

function completeResultRevealStages() {
  clearResultRevealTimers();
  const title = document.getElementById('resultTitle');
  const yakuList = document.getElementById('resultYaku');
  const score = document.getElementById('resultScore');
  const points = document.getElementById('resultPoints');
  const stages = [title, yakuList, score, points];

  stages.forEach((el, index) => {
    if (!el) return;
    el.classList.add('result-stage', 'reveal-in');
    if (index === 0) {
      el.classList.add('result-title-stage');
    } else {
      el.classList.remove('result-title-stage');
    }
    el.style.transitionDelay = '0ms';
  });
}

function playResultRevealStages() {
  const title = document.getElementById('resultTitle');
  const yakuList = document.getElementById('resultYaku');
  const score = document.getElementById('resultScore');
  const points = document.getElementById('resultPoints');
  const stages = [title, yakuList, score, points];

  stages.forEach((el, index) => {
    if (!el) return;
    el.classList.add('result-stage');
    if (index === 0) {
      el.classList.add('result-title-stage');
    }
    const timerId = setTimeout(() => {
      el.classList.add('reveal-in');
    }, 40 + index * 130);
    resultRevealTimers.push(timerId);
  });
}

// ====================== Rendering ======================
function renderAll() {
  renderSceneMode();
  renderInfoBar();
  renderDora();
  renderOpponent();
  renderMyHand();
  renderDiscards();
  renderMelds();
  renderWaitingTiles();
  renderTimer();
  renderTurnIndicator();
  renderRoomReadyBar();
  renderRoundReadyBar();
  renderMatchOverPanel();
}

function renderSceneMode() {
  const app = document.getElementById('app');
  if (!app) return;

  const inWaitingRoom = isInWaitingRoom();
  app.classList.toggle('waiting-room-scene', inWaitingRoom);
  renderRoomSeatStatus(inWaitingRoom);
}

function renderRoomSeatStatus(inWaitingRoom = isInWaitingRoom()) {
  const myStatus = document.getElementById('myRoomStatus');
  const oppStatus = document.getElementById('oppRoomStatus');
  if (!myStatus || !oppStatus) return;

  const setStatus = (el, text, variant, visible) => {
    el.textContent = text;
    el.className = `room-status-badge ${variant}`;
    el.style.display = visible ? 'inline-flex' : 'none';
  };

  if (!inWaitingRoom) {
    setStatus(myStatus, '', '', false);
    setStatus(oppStatus, '', '', false);
    return;
  }

  const mySeatKnown = Number.isInteger(state.mySeat) && state.mySeat >= 0;
  const myReady = mySeatKnown ? !!state.roomReadyBySeat[state.mySeat] : false;
  const oppSeat = mySeatKnown ? 1 - state.mySeat : null;
  const oppJoined = oppSeat !== null && (state.roomPlayers || []).some(player => player.seat === oppSeat);
  const oppReady = oppJoined ? !!state.roomReadyBySeat[oppSeat] : false;

  setStatus(myStatus, myReady ? '已准备' : '未准备', myReady ? 'is-ready' : 'is-pending', true);
  if (!oppJoined) {
    setStatus(oppStatus, '等待加入', 'is-ghost', true);
    return;
  }
  setStatus(oppStatus, oppReady ? '已准备' : '未准备', oppReady ? 'is-ready' : 'is-pending', true);
}

function leaveWaitingRoom() {
  sound.play('uiCancel');
  send({ type: 'leave_room' });
}

function setRoomReady(ready) {
  sound.play(ready ? 'roomReadyOn' : 'roomReadyOff');
  send({ type: ready ? 'room_ready' : 'room_unready' });
}

function renderRoomReadyBar() {
  const bar = document.getElementById('roomReadyBar');
  const text = document.getElementById('roomReadyText');
  const btnReady = document.getElementById('btnRoomReady');
  const btnUnready = document.getElementById('btnRoomUnready');
  if (!bar || !text || !btnReady || !btnUnready) return;

  const inWaitingRoom = isInWaitingRoom();
  bar.style.display = inWaitingRoom ? 'flex' : 'none';
  if (!inWaitingRoom) return;

  const myReady = !!state.roomReadyBySeat[state.mySeat];
  const oppSeat = 1 - state.mySeat;
  const oppReady = !!state.roomReadyBySeat[oppSeat];
  const playerCount = (state.roomPlayers || []).length;

  if (playerCount < 2) {
    text.textContent = '已进入房间，等待对手加入...';
  } else if (myReady && oppReady) {
    text.textContent = '双方已准备，正在开始对局...';
  } else {
    text.textContent = '双方准备后将自动开始对局';
  }

  btnReady.style.display = myReady ? 'none' : 'inline-block';
  btnUnready.style.display = myReady ? 'inline-block' : 'none';
}

function renderRoundReadyBar() {
  const bar = document.getElementById('roundReadyBar');
  const text = document.getElementById('roundReadyText');
  const btn = document.getElementById('btnRoundReady');
  if (!bar || !text || !btn) return;

  const inRoundEnd = state.phase === 'round_end';
  bar.style.display = inRoundEnd ? 'flex' : 'none';
  if (!inRoundEnd) return;

  const myReady = state.roundReadySeats.includes(state.mySeat);
  const oppSeat = 1 - state.mySeat;
  const oppReady = state.roundReadySeats.includes(oppSeat);

  if (myReady) {
    text.textContent = oppReady ? '双方已继续，正在开始下一局...' : '已继续，等待对手继续...';
  } else if (oppReady) {
    text.textContent = '对手已继续，点击继续开始下一局';
  } else {
    text.textContent = '本局已结束，点击继续开始下一局';
  }

  btn.style.display = myReady ? 'none' : 'inline-block';
}

function renderWaitingTiles() {
  const waitsEl = document.getElementById('myWaits');
  if (!waitsEl) return;

  const waits = state.myWaitingTiles || [];
  const show = state.myDeclaredTenpai || waits.length > 0;

  if (!show) {
    waitsEl.style.display = 'none';
    waitsEl.innerHTML = '';
    return;
  }

  waitsEl.style.display = 'flex';
  waitsEl.innerHTML = '';

  const label = document.createElement('span');
  label.className = 'my-waits-label';
  label.textContent = '待牌';
  waitsEl.appendChild(label);

  if (waits.length === 0) {
    const empty = document.createElement('span');
    empty.className = 'my-waits-empty';
    empty.textContent = '已宣告听牌';
    waitsEl.appendChild(empty);
    return;
  }

  const tiles = document.createElement('div');
  tiles.className = 'my-waits-values my-waits-tiles';

  for (const wait of waits) {
    const tileTypeValue = typeof getTileTypeFromLabel === 'function' ? getTileTypeFromLabel(wait) : null;
    if (tileTypeValue !== null && tileTypeValue !== undefined) {
      tiles.appendChild(createTileTypeElement(tileTypeValue, { size: 'mini' }));
      continue;
    }

    const fallback = document.createElement('span');
    fallback.className = 'my-waits-fallback';
    fallback.textContent = String(wait);
    tiles.appendChild(fallback);
  }

  waitsEl.appendChild(tiles);
}

// ===== [U1] Turn indicator =====
function renderTurnIndicator() {
  const oppArea = document.querySelector('.opponent-area');
  const playerArea = document.querySelector('.player-area');
  const waitEl = document.getElementById('waitingIndicator');
  const waitText = waitEl ? waitEl.querySelector('.waiting-text') : null;

  document.querySelectorAll('.turn-badge').forEach(el => el.remove());

  const showTurn = ['phase1_draw', 'phase1_action', 'phase1_response', 'phase2_guess', 'phase2_draw', 'phase2_action'].includes(state.phase)
    && Number.isInteger(state.currentTurn)
    && state.currentTurn >= 0;

  if (!showTurn) {
    oppArea.classList.remove('active-turn');
    playerArea.classList.remove('active-turn');
    if (waitEl) waitEl.style.display = 'none';
    return;
  }

  const isMyTurn = state.currentTurn === state.mySeat;

  oppArea.classList.toggle('active-turn', !isMyTurn);
  playerArea.classList.toggle('active-turn', isMyTurn);

  // Turn badge in info bars
  if (isMyTurn) {
    const badge = document.createElement('span');
    badge.className = 'turn-badge';
    badge.textContent = '你的回合';
    document.querySelector('.player-info').appendChild(badge);
  } else {
    const badge = document.createElement('span');
    badge.className = 'turn-badge';
    badge.textContent = '对手回合';
    document.querySelector('.opponent-info').appendChild(badge);
  }

  // [R2-8] Waiting indicator
  if (waitEl) {
    const mySeatReady = Number.isInteger(state.mySeat) && state.mySeat >= 0;
    const opponentThinkingPhase = state.phase === 'phase1_action' || state.phase === 'phase2_guess' || state.phase === 'phase2_draw' || state.phase === 'phase2_action';
    const iCanActNow = state.phase === 'phase1_response' || (actions && Object.keys(actions).some(k => k.startsWith('can_') && actions[k]));
    const showWaiting = mySeatReady && !isMyTurn && opponentThinkingPhase && !iCanActNow;
    if (waitText) {
      waitText.textContent = state.phase === 'phase2_draw' ? '对手摸牌中...' : '对手思考中...';
    }
    waitEl.style.display = showWaiting ? 'flex' : 'none';
  }
}

function canInteractWithHand() {
  return state.currentTurn === state.mySeat && (state.phase === 'phase1_action' || state.phase === 'phase2_action');
}

function canDiscardTile(tileId) {
  if (!canInteractWithHand()) return false;
  if (Array.isArray(actions.tenpai_discards) && actions.tenpai_discards.length > 0) {
    return actions.tenpai_discards.includes(tileId);
  }
  return true;
}

function renderMyHand() {
  const container = document.getElementById('myTiles');
  const nameEl = document.getElementById('myName');
  const pointsEl = document.getElementById('myPoints');
  const dealerEl = document.getElementById('myDealer');

  nameEl.textContent = username || '我';
  pointsEl.textContent = state.myPoints;
  dealerEl.style.display = (state.dealerSeat === state.mySeat) ? 'inline' : 'none';

  container.innerHTML = '';

  // Sort hand but separate draw tile
  const handTiles = state.myHand.filter(t => t !== state.myDrawTile);
  handTiles.sort((a, b) => tileType(a) - tileType(b));

  const canDiscard = canInteractWithHand();
  if (!canDiscard) {
    selectedTile = null;
  }

  // [R2-1] Add suit group gaps
  let prevSuitGroup = -1;
  for (const t of handTiles) {
    const tt = tileType(t);
    const suitGroup = tt < 9 ? 0 : tt < 18 ? 1 : tt < 27 ? 2 : 3;
    if (prevSuitGroup >= 0 && suitGroup !== prevSuitGroup) {
      const gap = document.createElement('span');
      gap.className = 'suit-gap';
      container.appendChild(gap);
    }
    prevSuitGroup = suitGroup;
    const tileClickable = canDiscardTile(t);
    const el = createTileElement(t, { clickable: tileClickable, selected: selectedTile === t });
    if (tileClickable) {
      el.addEventListener('click', () => selectTile(t));
    }
    container.appendChild(el);
  }

  // Draw tile with gap + entrance animation [U5]
  if (state.myDrawTile !== null && state.myHand.includes(state.myDrawTile)) {
    const gap = document.createElement('span');
    gap.style.width = '12px';
    container.appendChild(gap);
    const drawClickable = canDiscardTile(state.myDrawTile);
    const el = createTileElement(state.myDrawTile, { clickable: drawClickable, selected: selectedTile === state.myDrawTile });
    el.classList.add('draw-tile-enter');
    if (drawClickable) {
      el.addEventListener('click', () => selectTile(state.myDrawTile));
    }
    container.appendChild(el);
  }
}

function renderDiscards() {
  const myPond = document.getElementById('myDiscard');
  const oppPond = document.getElementById('oppDiscard');
  myPond.innerHTML = '';
  oppPond.innerHTML = '';
  for (let i = 0; i < state.myDiscards.length; i++) {
    const el = createTileElement(state.myDiscards[i], { size: 'mini' });
    if (i === state.myDiscards.length - 1) el.classList.add('last-discard');
    myPond.appendChild(el);
  }
  for (let i = 0; i < state.oppDiscards.length; i++) {
    const el = createTileElement(state.oppDiscards[i], { size: 'mini' });
    if (i === state.oppDiscards.length - 1) el.classList.add('last-discard');
    oppPond.appendChild(el);
  }
}

function renderMelds() {

  for (const m of state.myMelds) {

function getKakanAddedTile(meld) {
  if (!meld) return null;
  if (typeof meld.added_tile === 'number') {
    return meld.added_tile;
  }
  if (Array.isArray(meld.tiles) && meld.tiles.length === 4) {
    return meld.tiles[meld.tiles.length - 1];
  }
  return null;
}

function getMeldBaseTiles(meld) {
  if (!meld || !Array.isArray(meld.tiles)) {
    return [];
  }
  if (meld.type !== 'kakan') {
    return [...meld.tiles];
  }

  const addedTile = getKakanAddedTile(meld);
  if (typeof addedTile !== 'number') {
    return [...meld.tiles];
  }

  let removed = false;
  return meld.tiles.filter((tile) => {
    if (!removed && tile === addedTile) {
      removed = true;
      return false;
    }
    return true;
  });
}

function appendMeldSlot(group, tileId, options = {}) {
  const slot = document.createElement('div');
  slot.className = 'meld-slot';
  if (options.slotClassName) {
    slot.classList.add(...options.slotClassName.split(' ').filter(Boolean));
  }

  const tileEl = createTileElement(tileId, {
    size: options.size || 'small',
    rotated: !!options.rotated,
  });
  if (options.tileClassName) {
    tileEl.classList.add(...options.tileClassName.split(' ').filter(Boolean));
  }

  slot.appendChild(tileEl);
  group.appendChild(slot);
  return { slot, tileEl };
}

function moveCalledTileToCenter(tiles, calledTile) {
  if (!Array.isArray(tiles) || typeof calledTile !== 'number') {
    return Array.isArray(tiles) ? [...tiles] : [];
  }

  const calledIndex = tiles.indexOf(calledTile);
  if (calledIndex < 0) {
    return [...tiles];
  }

  const remaining = tiles.filter((_, index) => index !== calledIndex);
  if (remaining.length === 2) {
    return [remaining[0], calledTile, remaining[1]];
  }
  if (remaining.length === 3) {
    return [remaining[0], calledTile, remaining[1], remaining[2]];
  }
  return [...tiles];
}

function getOpenMeldDisplayTiles(meld) {
  if (!meld) return [];

  const baseTiles = meld.type === 'kakan'
    ? getMeldBaseTiles(meld)
    : Array.isArray(meld.tiles) ? [...meld.tiles] : [];
  const calledTile = typeof meld.called_tile === 'number' ? meld.called_tile : null;

  if (calledTile === null) {
    return baseTiles;
  }
  if (meld.type === 'chi') {
    return baseTiles;
  }
  if (meld.type === 'pon' || meld.type === 'minkan' || meld.type === 'kakan') {
    return moveCalledTileToCenter(baseTiles, calledTile);
  }
  return baseTiles;
}

function renderStandardOpenMeld(group, meld, size) {
  for (const tileId of getOpenMeldDisplayTiles(meld)) {
    appendMeldSlot(group, tileId, {
      size,
      rotated: typeof meld.called_tile === 'number' && tileId === meld.called_tile,
    });
  }
}

function renderAnkanMeld(group, meld, size) {
  const concealedIndexes = new Set([0, 3]);
  for (let index = 0; index < (meld.tiles || []).length; index++) {
    if (concealedIndexes.has(index)) {
      appendMeldSlot(group, null, { size, slotClassName: 'meld-slot-concealed' });
      continue;
    }
    appendMeldSlot(group, meld.tiles[index], { size });
  }
}

function renderKakanMeld(group, meld, size) {
  const calledTile = typeof meld.called_tile === 'number' ? meld.called_tile : null;
  const addedTile = getKakanAddedTile(meld);
  const baseTiles = getOpenMeldDisplayTiles(meld);

  if (calledTile === null || typeof addedTile !== 'number' || baseTiles.length !== 3) {
    renderStandardOpenMeld(group, meld, size);
    return;
  }

  let stacked = false;
  for (const tileId of baseTiles) {
    if (!stacked && tileId === calledTile) {
      const { slot } = appendMeldSlot(group, tileId, {
        size,
        rotated: true,
        slotClassName: 'meld-stack-slot',
        tileClassName: 'meld-called-base',
      });
      const addedTileEl = createTileElement(addedTile, { size });
      addedTileEl.classList.add('meld-added-tile');
      slot.appendChild(addedTileEl);
      stacked = true;
      continue;
    }
    appendMeldSlot(group, tileId, { size });
  }

  if (!stacked) {
    group.innerHTML = '';
    renderStandardOpenMeld(group, meld, size);
  }
}

function renderMeldGroup(meld, options = {}) {
  const size = options.size || 'small';
  const perspective = options.perspective || 'neutral';
  const group = document.createElement('div');
  group.className = 'meld-group';
  if (meld?.type) {
    group.classList.add(`meld-${meld.type}`);
  }
  if (perspective !== 'neutral') {
    group.classList.add(`meld-perspective-${perspective}`);
  }

  if (meld.type === 'ankan') {
    renderAnkanMeld(group, meld, size);
  } else if (meld.type === 'kakan') {
    renderKakanMeld(group, meld, size);
  } else {
    renderStandardOpenMeld(group, meld, size);
  }
  return group;
}

// ====================== Actions ======================
function selectTile(tileId) {
  if (!canInteractWithHand()) {
    selectedTile = null;
    renderMyHand();
    return;
  }
  if (selectedTile === tileId) {
    // Double-click = discard
    discardTile(tileId);
  } else {
    sound.play('uiTap');
    selectedTile = tileId;
    renderMyHand();
  }
}

function discardTile(tileId) {
  if (!canInteractWithHand()) {
    selectedTile = null;
    renderMyHand();
    return;
  }
  sound.play('uiTap');
  send({ type: 'discard_tile', tile: tileId });
  selectedTile = null;
}

function showCallActions() {

  document.getElementById('btnChi').style.display = actions.can_chi ? '' : 'none';

  ['btnTsumo','btnRon','btnChi','btnPon','btnKan','btnRiichi','btnTenpai','btnPass'].forEach(id => {
    document.getElementById(id).style.display = 'none';

function doAction(action) {
  sound.play('uiTap');
  switch (action) {
    case 'tsumo':
      send({ type: 'tsumo' });
      break;
    case 'ron':
      send({ type: 'call_ron' });
      break;
    case 'pon':
      send({ type: 'call_pon' });
      break;
    case 'pass':
      send({ type: 'call_pass' });
      break;
    case 'declare_riichi':
      send({ type: 'declare_riichi' });
      break;
    case 'declare_tenpai':
      send({ type: actions.can_declare_damaten ? 'declare_damaten' : 'declare_tenpai' });
      break;
  }
  hideActions();
}

    for (const t of opt) {
      btn.appendChild(createTileElement(t, { size: 'mini' }));

function showKanOptions() {
  const allOpts = [];

  for (const group of kanOptionsData.ankan) {
    allOpts.push({ label: '暗杠', action: () => send({ type: 'ankan', tiles: group }), tiles: group });
  }
  for (const [meld, extra] of kanOptionsData.kakan) {
    allOpts.push({ label: '加杠', action: () => send({ type: 'kakan', tile: extra }), tiles: meld.tiles.concat([extra]) });
  }
  if (kanOptionsData.minkan) {

  }

    allOpts[0].action();

  container.innerHTML = '';
  for (const opt of allOpts) {

    btn.className = 'btn-action-call';
    btn.style.padding = '8px 16px';
    btn.textContent = opt.label;
    if (opt.tiles) {
      btn.textContent += ' ';
      for (const t of opt.tiles) {
        btn.appendChild(createTileElement(t, { size: 'mini' }));
      }
